name: Publish to ClawHub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Inject Git Tag Version into _meta.json
        run: |
          # Strip 'v' prefix from tag name (e.g. v2.0.4 -> 2.0.4)
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          
          # Overwrite the version field in _meta.json using jq
          jq --arg ver "$VERSION" '.version = $ver' _meta.json > temp.json && mv temp.json _meta.json
          
          echo "Injected version: $VERSION"

      - name: Generate Changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          
          # Find the previous tag (excluding current)
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found. Generating changelog from beginning of history."
            git log "${CURRENT_TAG}" --format="- %s" > changelog.txt
          else
            echo "Generating changelog between $PREV_TAG and $CURRENT_TAG."
            git log "${PREV_TAG}..${CURRENT_TAG}" --format="- %s" > changelog.txt
          fi
          
          echo "Changelog content:"
          cat changelog.txt

      - name: Sync README sections to SKILL.md
        run: |
          node -e '
          const fs = require("fs");
          const readme = fs.readFileSync("README.md", "utf8");
          let skill = fs.readFileSync("SKILL.md", "utf8");
          
          function extractSection(markdown, heading) {
            const hashCount = (heading.match(/^#+/) || [""])[0].length;
            const lines = markdown.split(/\r?\n/);
            let startIndex = -1;
            for (let i = 0; i < lines.length; i++) {
              if (lines[i].trim() === heading) {
                startIndex = i;
                break;
              }
            }
            if (startIndex === -1) return "";
            
            const sectionLines = [lines[startIndex]];
            for (let i = startIndex + 1; i < lines.length; i++) {
              const line = lines[i];
              const match = line.match(/^(#+)\s/);
              if (match && match[1].length <= hashCount) {
                break;
              }
              sectionLines.push(line);
            }
            return sectionLines.join("\n");
          }
          
          const matches = [...skill.matchAll(/<!-- INSERT:SECTION:(.*?) -->/g)];
          for (const match of matches) {
            const tag = match[0];
            const heading = match[1];
            const sectionContent = extractSection(readme, heading);
            if (sectionContent) {
              skill = skill.replace(tag, sectionContent);
            }
          }
          
          fs.writeFileSync("SKILL.md", skill, "utf8");
          '

      - name: Remove non-production files before publishing
        run: |
          rm -rf tests/ conftest.py .pytest_cache/ __pycache__/ financial_categorizer/__pycache__/
          rm -rf example_data/ todo.md .github/ .gitignore .clawignore

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub login --token "$CLAWHUB_TOKEN"
          SLUG=$(jq -r '.slug' _meta.json)
          VERSION=$(jq -r '.version' _meta.json)
          CHANGELOG=$(cat changelog.txt)
          clawhub publish . --slug "$SLUG" --version "$VERSION" --changelog "$CHANGELOG"
